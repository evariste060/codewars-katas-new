<body>
    <script>
       let urls = [
    "https://dummyjson.com/posts",
    "https://this-may-not-exist.com/posts",
    "https://jsonplaceholder.typicode.com/posts"
]

async function getFastPost(urls){
    let requests = await Promise.any(urls.map(url => fetch(url)))
    let post = await requests.json()
    return post 
}
getFastPost(urls).then((posts) => { 
    //console.log(posts) 
    for(const {id,title} of posts){
    console.log(id,title)
    }
})
    </script>
</body>
